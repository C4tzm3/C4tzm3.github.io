<header class="site-header" role="banner">
  <div class="wrapper site-nav-wrap">
    <a class="site-title" rel="author" href="{{ "/" | relative_url }}">C4tzm3</a>

    <nav class="site-nav-links">
      <a class="page-link" href="/ctf/">CTF</a>
      <a class="page-link" href="/notes/">Notes</a>
      <a class="page-link" href="/projects/">Projects</a>
      <a class="page-link" href="/others/">Others</a>
      <a class="page-link" href="/about/">About</a>
      <button class="theme-btn" id="theme-toggle"
        onclick="(function(b){
          var h=document.documentElement;
          var n=h.getAttribute('data-theme')==='dark'?'light':'dark';
          h.setAttribute('data-theme',n);
          localStorage.setItem('theme',n);
          b.querySelector('.t-icon').textContent=n==='dark'?'\u2600':'\u263E';
        })(this)">
        <span class="t-icon">&#9790;</span>
      </button>
    </nav>
  </div>
</header>

<style>
.site-nav-wrap {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.site-nav-links {
  display: flex;
  align-items: center;
  gap: 0.25rem;
}
.site-nav-links .page-link {
  color: var(--text) !important;
  font-size: 0.9rem;
  font-weight: 500;
  padding: 0.3rem 0.65rem;
  border-radius: 6px;
  transition: background 0.15s ease, color 0.15s ease;
  text-decoration: none !important;
}
.site-nav-links .page-link:hover {
  background: var(--bg2);
  color: var(--accent) !important;
}
.theme-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 1rem;
  padding: 0.25rem 0.55rem;
  cursor: pointer;
  margin-left: 0.25rem;
  transition: border-color 0.2s ease, background 0.2s ease;
  line-height: 1.4;
}
.theme-btn:hover {
  border-color: var(--accent);
  background: var(--bg2);
  color: var(--accent);
}
[data-theme="dark"] .site-nav-links .page-link { color: #c0caf5 !important; }
[data-theme="dark"] .site-nav-links .page-link:hover { background: #292e42; color: #7aa2f7 !important; }
[data-theme="dark"] .theme-btn { color: #c0caf5; border-color: #292e42; }
[data-theme="dark"] .theme-btn:hover { background: #292e42; color: #7aa2f7; }
</style>

<script>
(function() {
  var icon = document.querySelector('#theme-toggle .t-icon');
  if (icon) icon.textContent = document.documentElement.getAttribute('data-theme') === 'dark' ? '\u2600' : '\u263E';
})();
</script>

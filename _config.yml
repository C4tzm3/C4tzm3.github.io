# Site settings
title: "C4tzm3's Tech Blog"
description: "CTF Writeups, Security Notes & Technical Documentation. Learn about cybersecurity, Splunk administration, and security research."
author: "C4tzm3"
email: ""  # Email hidden for privacy
baseurl: ""  # leave empty for user site
url: "https://c4tzm3.github.io"

# SEO settings
tagline: "Cybersecurity Notes, CTF Writeups & Technical Guides"
keywords: "CTF, cybersecurity, Splunk, security notes, writeups, penetration testing, SIEM, security research"
lang: "en_US"

# Google Search Console verification
webmaster_verifications:
  google: "zrh2dN1obfAn0xJP20vY9toJ0EayCQP1vB43nhyhTbA"

# Social links for SEO (keeping GitHub for code sharing only)
github_username: C4tzm3

# Build settings
markdown: kramdown
theme: minima
highlighter: rouge  # ensures code blocks are highlighted
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  posts:
    output: true
    permalink: /:categories/:year/:month/:day/:title/

# Navigation
header_pages:
  - ctf.md
  - notes.md
  - projects.md
  - about.md
  - others.md

# Pagination
paginate: 10
paginate_path: "/page:num/"

# Exclude files
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
